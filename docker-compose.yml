services:
  postgres:
    image: postgres:17
    networks:
      - backend
    environment:
      POSTGRES_DB: railly
      POSTGRES_USER: railly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    # Bind to localhost only — not exposed to the internet
    # Remove these ports in production or use a firewall
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    networks:
      - backend
    # Require authentication + AOF persistence for Darwin data durability
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
    # Bind to localhost only — not exposed to the internet
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - frontend
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://railly:${POSTGRES_PASSWORD}@postgres:5432/railly
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: railly
      POSTGRES_USER: railly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      API_PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  consumer:
    build:
      context: .
      dockerfile: packages/consumer/Dockerfile
    networks:
      - backend
    environment:
      NODE_ENV: production
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-darwin}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-railly-consumer}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      KAFKA_SESSION_TIMEOUT_MS: ${KAFKA_SESSION_TIMEOUT_MS:-45000}
      KAFKA_HEARTBEAT_INTERVAL_MS: ${KAFKA_HEARTBEAT_INTERVAL_MS:-3000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      METRICS_INTERVAL_MS: ${METRICS_INTERVAL_MS:-30000}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  seed:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.seed
    networks:
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://railly:${POSTGRES_PASSWORD}@postgres:5432/railly
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: railly
      POSTGRES_USER: railly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data/PPTimetable:/app/data/PPTimetable:ro

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - frontend
    depends_on:
      - api

networks:
  frontend:
    # Only api + frontend on this network
  backend:
    # Only api + postgres + redis on this network

volumes:
  postgres_data:
  redis_data: