<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Railly - Rail Buddy — Live UK train tracking, departure boards, disruption alerts, and delay repay" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Railly — Rail Buddy</title>
    <!-- Prevent flash of wrong theme — set dark class so CSS custom properties resolve correctly before React hydrates -->
    <script>
      (function() {
        var stored = localStorage.getItem('railly-theme');
        var theme;
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
