# Proxy cache path for board API responses
# Levels=2 creates two-level subdirectory structure for efficient caching
# max_size=64m keeps cached responses in shared memory
# inactive=30s purges cached entries not accessed within 30 seconds
# proxy_temp_path on same volume avoids cross-device rename errors
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=64m inactive=30s use_temp_path=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Security headers (applied globally, but nginx add_header doesn't cascade
    # into location blocks that also use add_header — so we must repeat them)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-5vi1Tqm3wNpfM9MeW78akElM1AMSbQzyyh/aRJE3Cvw='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    # HSTS — only effective over HTTPS; harmless over HTTP
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # API reverse proxy — board responses are cached at nginx level
    # The API sets Cache-Control: public, max-age=10, stale-while-revalidate=15
    # which allows nginx to serve cached responses while the API revalidates.
    # Station search and other non-board endpoints are not cached (no Cache-Control).
    # NOTE: No trailing slash — must match both /api/v1/stations?q=EUS (search)
    # and /api/v1/stations/KGX/board (board) to avoid 301 redirects.
    location /api/v1/stations {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Request timeout — prevent slow clients from holding connections
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Cache board API responses using the api_cache zone
        # Only cache 200 responses (successful board data)
        # Cache for 10s (matches API max-age), serve stale for up to 30s
        proxy_cache api_cache;
        proxy_cache_valid 200 10s;
        proxy_cache_valid 404 5s;
        proxy_cache_valid 500 503 1s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;                    # Prevent cache stampede
        proxy_cache_lock_timeout 3s;            # Wait up to 3s for first request to populate
        proxy_cache_methods GET;

        # Pass X-Cache header from API (HIT/MISS) through to client
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add cache status header for debugging
        add_header X-Cache-Status $upstream_cache_status always;

        # Security headers — must be repeated here because nginx add_header
        # doesn't cascade from server context when location uses add_header
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # Other API endpoints — not cached (health, services, etc.)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # No caching for non-board API endpoints
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # WebSocket reverse proxy
    location /ws {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        # Must repeat security headers for static assets too
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-5vi1Tqm3wNpfM9MeW78akElM1AMSbQzyyh/aRJE3Cvw='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cache-Control "public, immutable";
    }

    # Block access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
        return 404;
    }
}